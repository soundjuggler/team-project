<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Letterboxxed &middot; Home Page</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="page-index">
        <nav>
            <div class="nav-left">
                <a class="brand" href="index.html" aria-label="LETTERBOXXED Home">LETTERBOXXED</a>
                <a href="index.html">Home</a>
                <a href="add.html">Add Movie</a>
                <a href="analytics.html">Analytics</a>
            </div>
            <a class="nav-github" href="https://github.com/soundjuggler/team-project" target="_blank" rel="noreferrer">
                GitHub
                <svg class="nav-external-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42 9.3-9.29H14V3ZM5 5h6v2H7v10h10v-4h2v6H5V5Z"></path>
                </svg>
            </a>
        </nav>
        <h1>All Movies</h1>
        <div class="filters">
            <label for="statusFilter">Filter:</label>
            <select id="statusFilter" onchange="applyFilters()">
                <option value="all">All</option>
                <option value="watchlist">Watchlist</option>
                <option value="watched">Watched</option>
                <option value="abandoned">Abandoned</option>
            </select>
            <label for="sortBy">Sort:</label>
            <select id="sortBy" onchange="applyFilters()">
                <option value="date-desc">Date Created (Newest)</option>
                <option value="date-asc">Date Created (Oldest)</option>
                <option value="year-asc">Year (Ascending)</option>
                <option value="year-desc">Year (Descending)</option>
                <option value="rating-asc">IMDb Rating (Ascending)</option>
                <option value="rating-desc">IMDb Rating (Descending)</option>
            </select>
        </div>
        <div id="movies-container"></div>
        <div id="movieModal" class="modal">
            <div class="modal-content">
                <span class="modal-close" onclick="closeMovieModal()">&times;</span>
                <h2 id="modalTitle"></h2>
                <div class="status-header">
                    <label for="modalStatus">Status:</label>
                    <select id="modalStatus" onchange="onStatusChange()">
                        <option value="watchlist">Watchlist</option>
                        <option value="watched">Watched</option>
                        <option value="abandoned">Abandoned</option>
                    </select>
                </div>
                <div class="info-field">
                    <label>Year:</label>
                    <p id="modalYear"></p>
                </div>
                <div class="info-field">
                    <label>Genre:</label>
                    <p id="modalGenre"></p>
                </div>
                <div class="info-field">
                    <label>Director:</label>
                    <p id="modalDirector"></p>
                </div>
                <div class="info-field">
                    <label>Runtime:</label>
                    <p id="modalRuntime"></p>
                </div>
                <div class="info-field">
                    <label>IMDb Rating:</label>
                    <p id="modalImdbRating"></p>
                </div>
                <div class="info-field">
                    <label>Poster:</label>
                    <img id="modalPoster" src="" alt="">
                </div>
                <div id="userFields">
                    <label for="modalRating">Your Rating (1-10):</label>
                    <input type="number" id="modalRating" min="1" max="10" step="0.1" oninput="validateRating();onFieldChange()">
                    <label for="modalWatchedDate">Date Watched:</label>
                    <input type="date" id="modalWatchedDate" onchange="validateDate();onFieldChange()">
                    <label for="modalNotes">Notes:</label>
                    <textarea id="modalNotes" oninput="onFieldChange()"></textarea>
                </div>
                <div class="modal-buttons">
                    <button id="updateBtn" onclick="updateMovie()" disabled>Update</button>
                    <button id="deleteBtn" onclick="confirmDelete()">Delete</button>
                </div>
            </div>
        </div>
        <script src="app.js"></script>
    </body>
</html>
